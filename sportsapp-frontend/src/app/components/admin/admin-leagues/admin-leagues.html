<div class="admin-section">
  <div class="section-header">
    <div>
      <h1 class="section-title">Lige</h1>
      <p class="section-sub">Upravljaj ligama u aplikaciji</p>
    </div>
    <button class="btn-add" type="button" (click)="openModal()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      Dodaj ligu
    </button>
  </div>

  <div class="table-container">
    <table class="data-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Logo</th>
          <th>Naziv</th>
          <th>Država</th>
          <th>Sport</th>
          <th>Akcije</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let league of leagues">
          <td class="td-id">{{ league.id }}</td>
          <td>
            <img *ngIf="league.logoUrl" [src]="league.logoUrl" class="sport-icon-img" alt="logo"
                 (error)="league.logoUrl = ''" />
            <span *ngIf="!league.logoUrl" class="no-icon">—</span>
          </td>
          <td class="td-name">{{ league.name }}</td>
          <td>{{ league.country }}</td>
          <td>{{ league.sport?.name || '—' }}</td>
          <td>
            <div class="action-btns">
              <button class="btn-edit" type="button" (click)="openModal(league)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                Uredi
              </button>
              <button class="btn-delete" type="button" (click)="deleteLeague(league.id!)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                Obriši
              </button>
            </div>
          </td>
        </tr>
        <tr *ngIf="leagues.length === 0">
          <td colspan="6" class="empty-row">Nema liga. Dodaj prvu ligu!</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal-overlay" *ngIf="showModal" (click)="closeModal()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2 class="modal-title">{{ editMode ? 'Uredi ligu' : 'Dodaj ligu' }}</h2>
      <button class="modal-close" type="button" (click)="closeModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Naziv lige</label>
        <input class="form-input" type="text" [(ngModel)]="form.name" placeholder="npr. Premier League" />
      </div>
      <div class="form-group">
        <label class="form-label">Država</label>
        <input class="form-input" type="text" [(ngModel)]="form.country" placeholder="npr. Engleska" />
      </div>
      <div class="form-group">
        <label class="form-label">Logo URL</label>
        <input class="form-input" type="text" [(ngModel)]="form.logoUrl" placeholder="https://..." />
      </div>
      <div class="form-group">
        <label class="form-label">Sport</label>
        <select class="form-input" [(ngModel)]="selectedSportId">
          <option [ngValue]="null">-- Odaberi sport --</option>
          <option *ngFor="let sport of sports" [ngValue]="sport.id">{{ sport.name }}</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" type="button" (click)="closeModal()">Odustani</button>
      <button class="btn-save" type="button" (click)="saveLeague()" [disabled]="saving">
        {{ saving ? 'Čekaj...' : (editMode ? 'Spremi' : 'Dodaj') }}
      </button>
    </div>
  </div>
</div>
