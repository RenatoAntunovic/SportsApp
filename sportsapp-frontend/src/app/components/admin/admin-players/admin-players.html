<div class="admin-section">
  <div class="section-header">
    <div>
      <h1 class="section-title">Igrači</h1>
      <p class="section-sub">Upravljaj igračima u aplikaciji</p>
    </div>
    <button class="btn-add" type="button" (click)="openModal()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      Dodaj igrača
    </button>
  </div>

  <div class="table-container">
    <table class="data-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Foto</th>
          <th>Ime</th>
          <th>Pozicija</th>
          <th>Godine</th>
          <th>Nacionalnost</th>
          <th>Tim</th>
          <th>Akcije</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let player of players">
          <td class="td-id">{{ player.id }}</td>
          <td>
            <img *ngIf="player.photoUrl" [src]="player.photoUrl" class="sport-icon-img" alt="logo"
                 (error)="player.photoUrl = ''" />
            <span *ngIf="!player.photoUrl" class="no-icon">—</span>
          </td>
          <td class="td-name">{{ player.name }}</td>
          <td>{{ player.position }}</td>
          <td>{{ player.age }}</td>
          <td>{{ player.nationality }}</td>
          <td>{{ player.team?.name }}</td>
          <td>
            <div class="action-btns">
              <button class="btn-edit" type="button" (click)="openModal(player)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                Uredi
              </button>
              <button class="btn-delete" type="button" (click)="deletePlayer(player.id!)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                Obriši
              </button>
            </div>
          </td>
        </tr>
        <tr *ngIf="teams.length === 0">
          <td colspan="6" class="empty-row">Nema igrača. Dodaj prvog igrača!</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal-overlay" *ngIf="showModal" (click)="closeModal()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2 class="modal-title">{{ editMode ? 'Uredi tim' : 'Dodaj tim' }}</h2>
      <button class="modal-close" type="button" (click)="closeModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Ime i prezime igrača</label>
        <input class="form-input" type="text" [(ngModel)]="form.name" placeholder="npr. Renato Antunović" />
      </div>
       <div class="form-group">
        <label class="form-label">Pozicija</label>
        <input class="form-input" type="text" [(ngModel)]="form.position" placeholder="Napadač" />
      </div>
       <div class="form-group">
        <label class="form-label">Godine</label>
        <input class="form-input" type="text" [(ngModel)]="form.age" placeholder="22" />
      </div>
      <div class="form-group">
        <label class="form-label">Nacionalnost</label>
        <input class="form-input" type="text" [(ngModel)]="form.nationality" placeholder="npr. Bosna i Hercegovina" />
      </div>
      <div class="form-group">
        <label class="form-label">Photo URL</label>
        <input class="form-input" type="text" [(ngModel)]="form.photoUrl" placeholder="https://..." />
      </div>
      <div class="form-group">
        <label class="form-label">Sport</label>
        <select class="form-input" [(ngModel)]="selectedSportId" (ngModelChange)="selectedLeagueId = null; selectedTeamId = null">
          <option [ngValue]="null">-- Odaberi sport --</option>
          <option *ngFor="let sport of sports" [ngValue]="sport.id">{{ sport.name }}</option>
        </select>
        </div>
        <div class="form-group">
        <label class="form-label">Liga</label>
        <select class="form-input" [(ngModel)]="selectedLeagueId" (ngModelChange)="selectedTeamId = null">">
          <option [ngValue]="null">-- Odaberi ligu --</option>
          <option *ngFor="let league of filteredLeagues" [ngValue]="league.id">{{ league.name }}</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Tim</label>
        <select class="form-input" [(ngModel)]="selectedTeamId">
          <option [ngValue]="null">-- Odaberi tim --</option>
          <option *ngFor="let team of filteredTeams" [ngValue]="team.id">{{ team.name }}</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" type="button" (click)="closeModal()">Odustani</button>
      <button class="btn-save" type="button" (click)="savePlayer()" [disabled]="saving">
        {{ saving ? 'Čekaj...' : (editMode ? 'Spremi' : 'Dodaj') }}
      </button>
    </div>
  </div>
</div>
