<div class="page">
  <app-navbar></app-navbar>

  <div class="content">
    <div class="page-header">
      <h1>Lige</h1>
      <p>Sve lige iz cijelog svijeta</p>
    </div>

    <div class="filter-bar">
      <div class="filter-group">
        <label>Sport</label>
        <select [(ngModel)]="selectedSportId">
          <option [ngValue]="null">Svi sportovi</option>
          <option *ngFor="let sport of sports" [ngValue]="sport.id">{{ sport.name }}</option>
        </select>
      </div>
    </div>

    <div class="leagues-grid">
      <div class="league-card" *ngFor="let league of filteredLeagues" [routerLink]="['/leagues',league.id]">
        <div class="league-header">
          <img *ngIf="league.logoUrl" [src]="league.logoUrl" class="league-logo" alt="logo" (error)="league.logoUrl = ''"/>
          <div *ngIf="!league.logoUrl" class="league-logo-placeholder">{{ league.name.charAt(0) }}</div>
          <div class="league-info">
            <div class="league-name">{{ league.name }}</div>
            <div class="league-country">{{ league.country }}</div>
          </div>
        </div>
        <div class="league-footer">
          <div class="league-sport-tag" *ngIf="league.sport">
            <span class="dot"></span>
            {{ league.sport.name }}
          </div>
        </div>
      </div>
      <div *ngIf="filteredLeagues.length === 0" class="empty-msg">
        Nema liga za ovaj filter.
      </div>
    </div>
  </div>

  <app-footer></app-footer>
</div>
