<div class="page">
  <app-navbar></app-navbar>

  <div class="content">
    <div class="page-header">
      <h1>Timovi</h1>
      <p>Svi timovi iz cijelog svijeta</p>
    </div>

    <div class="filter-bar">
      <div class="filter-group">
        <label>Sport</label>
        <select [(ngModel)]="selectedSportId" (ngModelChange)="onSportChange()">
          <option [ngValue]="null">Svi sportovi</option>
          <option *ngFor="let sport of sports" [ngValue]="sport.id">{{ sport.name }}</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Liga</label>
        <select [(ngModel)]="selectedLeagueId">
          <option [ngValue]="null">Sve lige</option>
          <option *ngFor="let league of filteredLeagues" [ngValue]="league.id">{{ league.name }}</option>
        </select>
      </div>
    </div>

    <div class="teams-grid">
      <div class="team-card" *ngFor="let team of filteredTeams" [routerLink]="['/teams', team.id]">
        <div class="team-logo-wrap">
          <img *ngIf="team.logoUrl" [src]="team.logoUrl" class="team-logo" alt="logo" (error)="team.logoUrl = ''"/>
          <div *ngIf="!team.logoUrl" class="team-logo-placeholder">{{ getTeamInitials(team.name) }}</div>
        </div>
        <div class="team-name">{{ team.name }}</div>
        <div class="team-country">{{ team.country }}</div>
        <div class="team-tags">
          <span class="team-tag sport" *ngIf="team.sport">{{ team.sport.name }}</span>
          <span class="team-tag league" *ngIf="team.league">{{ team.league.name }}</span>
        </div>
      </div>
      <div *ngIf="filteredTeams.length === 0" class="empty-msg">
        Nema timova za ovaj filter.
      </div>
    </div>
  </div>

  <app-footer></app-footer>
</div>
