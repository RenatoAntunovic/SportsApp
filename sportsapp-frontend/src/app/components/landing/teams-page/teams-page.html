<div class="page">
  <app-navbar></app-navbar>

  <div class="content">
    <div class="page-header">
      <h1>Timovi</h1>
      <p>Svi timovi iz cijelog svijeta</p>
    </div>

    <div class="filter-bar">
      <div class="filter-group">
        <label>Sport</label>
        <select [(ngModel)]="selectedSportId" (ngModelChange)="onSportChange()">
          <option [ngValue]="null">Svi sportovi</option>
          <option *ngFor="let sport of sports" [ngValue]="sport.id">{{ sport.name }}</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Liga</label>
        <select [(ngModel)]="selectedLeagueId">
          <option [ngValue]="null">Sve lige</option>
          <option *ngFor="let league of filteredLeagues" [ngValue]="league.id">{{ league.name }}</option>
        </select>
      </div>
      <div class="filter-toggle" *ngIf="authService.isLoggedIn()">
  <button class="toggle-btn" 
          [class.active]="showOnlyFavorites"
          (click)="showOnlyFavorites = !showOnlyFavorites">
    <svg width="16" height="16" viewBox="0 0 24 24" [attr.fill]="showOnlyFavorites ? '#ffaa2c' : 'none'" stroke="currentColor" stroke-width="2">
      <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
    </svg>
    Samo omiljeni
  </button>
</div>
    </div>

    <div class="teams-grid">
      <div class="team-card" *ngFor="let team of filteredTeams" [routerLink]="['/teams', team.id]">
        <button class="favorite-btn" 
                [class.active]="isFavorite(team.id!)" 
                (click)="toggleFavorite($event, team.id!)">
          <svg width="20" height="20" viewBox="0 0 24 24" [attr.fill]="isFavorite(team.id!) ? '#ffaa2c' : 'none'" stroke="currentColor" stroke-width="2">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
          </svg>
        </button>
        <div class="team-logo-wrap">
          <img *ngIf="team.logoUrl" [src]="team.logoUrl" class="team-logo" alt="logo" (error)="team.logoUrl = ''"/>
          <div *ngIf="!team.logoUrl" class="team-logo-placeholder">{{ getTeamInitials(team.name) }}</div>
        </div>
        <div class="team-name">{{ team.name }}</div>
        <div class="team-country">{{ team.country }}</div>
        <div class="team-tags">
          <span class="team-tag sport" *ngIf="team.sport">{{ team.sport.name }}</span>
          <span class="team-tag league" *ngIf="team.league">{{ team.league.name }}</span>
        </div>
      </div>
      <div *ngIf="filteredTeams.length === 0" class="empty-msg">
        Nema timova za ovaj filter.
      </div>
    </div>
  </div>

  <app-footer></app-footer>
</div>
